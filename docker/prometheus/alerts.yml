groups:
  - name: rag-chatbot
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(rag_http_requests_total{status_code=~"5.."}[5m]) / rate(rag_http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Tasa de errores > 5%"
          description: "{{ $value | humanizePercentage }} de peticiones están fallando"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(rag_http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latencia p95 > 5s"
          description: "El percentil 95 de latencia es {{ $value }}s"

      - alert: LowCacheHitRatio
        expr: rag_cache_hit_ratio < 0.3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cache hit ratio < 30%"
          description: "La caché tiene un ratio de aciertos de {{ $value | humanizePercentage }}"

      - alert: APIDown
        expr: up{job="rag-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API no disponible"
          description: "El endpoint /metrics de la API no responde"
