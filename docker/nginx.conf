# ═══════════════════════════════════════════════════════════════════════════
# ¿POR QUÉ NGINX COMO REVERSE PROXY?
#
# En producción NUNCA expones FastAPI directamente a internet. Nginx actúa
# de "portero":
#   1. Sirve los archivos estáticos del frontend (HTML/CSS/JS) directamente
#      desde disco, sin tocar Python. Esto es 100x más rápido.
#   2. Redirige las peticiones /api/* hacia FastAPI.
#   3. Elimina los problemas de CORS porque frontend y API comparten origen.
#   4. Puede hacer SSL termination, rate limiting, compresión gzip, etc.
# ═══════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name localhost;

    # Archivos estáticos del frontend
    root /usr/share/nginx/html;
    index index.html;

    # Aumentar límite de subida para documentos (por defecto Nginx limita a 1MB)
    client_max_body_size 50M;

    # Timeouts más largos para el chat (el LLM puede tardar varios segundos)
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # ─── Reverse proxy hacia la API ───────────────────────────────────────
    location /api/ {
        proxy_pass http://api:8000/;
        # "api" es el nombre del servicio en docker-compose — Docker resuelve
        # este hostname automáticamente dentro de la red interna.

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Para streaming de respuestas (si implementas SSE/streaming del LLM)
        proxy_buffering off;
        proxy_cache off;
    }

    # ─── SPA fallback ─────────────────────────────────────────────────────
    # Cualquier ruta que no sea un archivo ni /api/ sirve index.html
    # Necesario si en el futuro añades routing en el frontend
    location / {
        try_files $uri $uri/ /index.html;
    }
}
