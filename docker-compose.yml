version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
# ¿POR QUÉ DOCKER COMPOSE?
# En producción nunca levantas servicios a mano. Compose garantiza:
#   1. Orden de arranque correcto (postgres antes que la app)
#   2. Red interna privada entre servicios (no expones puertos innecesarios)
#   3. Variables de entorno centralizadas
#   4. Un solo comando para levantar todo: `docker compose up`
# En una empresa real esto sería Kubernetes, pero Compose es su hermano pequeño
# y el concepto es idéntico.
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL + pgvector ────────────────────────────────────────────────
  # ¿Por qué pgvector y no Pinecone/Weaviate/Qdrant?
  # Porque en producción quieres tus vectores JUNTO a tus metadatos.
  # pgvector te permite hacer: WHERE doc_id = X AND similarity > 0.8
  # con una sola query SQL. Los vector DBs externos obligan a dos llamadas de red.
  # Además: sin vendor lock-in, backups estándar de PostgreSQL, y ACID completo.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  # ¿Por qué Redis?
  # Dos roles fundamentales:
  #   1. CACHE: Si alguien pregunta lo mismo dos veces, no llamas a Groq.
  #      Ahorras latencia (de 2s a 10ms) y rate limits.
  #   2. MESSAGE BROKER para Celery: cuando subes un documento, no quieres
  #      que la API espere los 30s que tarda en procesarse. Redis actúa de
  #      cola: la API encola el job y responde inmediatamente con un job_id.
  #      El worker lo procesa en background.
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI (Backend) ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: rag_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://raguser:ragpassword@postgres:5432/ragdb
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./app:/app/app
      - uploaded_docs:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: rag_worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://raguser:ragpassword@postgres:5432/ragdb
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./app:/app/app
      - uploaded_docs:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  # ─── Frontend (Nginx sirviendo HTML estático) ─────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: rag_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploaded_docs:
